services:
  # Backend API Service
  - type: web
    name: infra-knowledge-graph-api
    runtime: python
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: infra-knowledge-graph-db
          property: connectionString
      - key: CORS_ORIGINS
        value: http://localhost:3000,https://localhost:3000
    healthCheckPath: /health

databases:
  # PostgreSQL Database
  - name: infra-knowledge-graph-db
    region: oregon
    plan: free
    databaseName: infra_knowledge_graph
    user: infra_user

