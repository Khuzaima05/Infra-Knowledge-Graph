version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ikg-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-ikg_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ikg_password}
      POSTGRES_DB: ${DB_NAME:-ikg_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ikg_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ikg-backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-ikg_user}:${DB_PASSWORD:-ikg_password}@postgres:5432/${DB_NAME:-ikg_db}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
      - repo_cache:/app/cloned_repos
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ikg-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
  repo_cache:
